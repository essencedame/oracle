const shuffle = (a) => {
  const r = [...a];
  for (let i = r.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [r[i], r[j]] = [r[j], r[i]];
  }
  return r;
};

const CSS = `
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400;9..40,500&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300&display=swap');

.or-root {
  --ink: #1f2124;
  --ink-2: #6b6f76;
  --ink-3: #9aa0a8;
  --paper: #ffffff;
  --line: rgba(31, 33, 36, 0.08);

  --deep: #6b6f76;
  --tint: #f7f7f5;

  --cw: 104px;   /* largeur carte dos */

  --radius: 900px; /* rayon de l'éventail : plus il est grand, plus l'étalement est large */

  --ui: 'DM Sans', -apple-system, system-ui, sans-serif;
  --read: 'Newsreader', Georgia, serif;

  min-height: 100vh;
  font-family: var(--ui);
  color: var(--ink);
  background: linear-gradient(180deg, var(--tint) 0%, #fcfcfb 60%);
  transition: background 1.1s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 0 64px;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ---------- accueil ---------- */
.or-start { display: flex; flex-direction: column; align-items: center; gap: 46px; }
.or-logo-idle { animation: or-breathe 5.5s ease-in-out infinite; }
@keyframes or-breathe {
  0%, 100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.05); opacity: 1; }
}
.or-btn {
  font-family: var(--ui);
  font-size: 14px;
  color: var(--paper);
  background: var(--ink);
  border: 0;
  border-radius: 999px;
  padding: 16px 34px;
  cursor: pointer;
  transition: transform 0.25s ease, opacity 0.25s ease;
}
.or-btn:hover { transform: translateY(-2px); opacity: 0.92; }
.or-btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 4px; }

/* ---------- étalement ---------- */
.or-spread-wrap { display: flex; flex-direction: column; align-items: center; gap: 26px; width: 100%; }
.or-spread {
  position: relative;
  width: 100%;
  height: calc(var(--ch) + 140px);
}
.or-back {
  position: absolute;
  left: 50%;
  bottom: 20px;
  width: var(--cw);
  height: var(--ch);
  margin-left: calc(var(--cw) / -2);
  transform-origin: 50% var(--radius);
  border: 0;
  padding: 0;
  border-radius: 12px;
  background: var(--paper);
  box-shadow: 0 1px 0 rgba(31, 33, 36, 0.06), 0 8px 22px rgba(31, 33, 36, 0.11);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.4s ease;
  animation: or-deal 0.7s cubic-bezier(0.22, 1, 0.36, 1) backwards;
}
.or-back::after {
  content: '';
  position: absolute;
  inset: 6px;
  border: 1px solid var(--line);
  border-radius: 7px;
  pointer-events: none;
}
@keyframes or-deal {
  from { transform: rotate(0deg) translateY(60px) scale(0.88); opacity: 0; }
}
.or-back:hover, .or-back:focus-visible {
  transform: rotate(var(--rot)) translateY(-26px) scale(1.06) !important;
  box-shadow: 0 20px 44px rgba(31, 33, 36, 0.2);
  z-index: 60;
}
.or-back:focus-visible { outline: 2px solid var(--ink); outline-offset: 3px; }

.or-hint { font-size: 12.5px; color: var(--ink-2); }

/* ---------- carte ---------- */
.or-card {
  width: min(480px, calc(100% - 36px));
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 28px;
  padding: 44px 32px 30px;
  box-shadow: 0 20px 60px rgba(31, 33, 36, 0.07);
  animation: or-in 0.75s cubic-bezier(0.22, 1, 0.36, 1) backwards;
}
@keyframes or-in { from { opacity: 0; transform: translateY(18px) scale(0.98); } }

.or-num-wrap { position: relative; display: flex; justify-content: center; align-items: center; }
.or-halo {
  position: absolute;
  width: 190px; height: 190px;
  border-radius: 50%;
  background: var(--pastel);
  opacity: 0.5;
  filter: blur(2px);
  animation: or-halo 1.1s cubic-bezier(0.22, 1, 0.36, 1) backwards;
}
@keyframes or-halo { from { transform: scale(0.5); opacity: 0; } }
.or-num {
  position: relative;
  font-size: clamp(96px, 26vw, 128px);
  font-weight: 200;
  line-height: 1;
  letter-spacing: -0.04em;
  color: var(--deep);
  animation: or-num-in 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s backwards;
}
@keyframes or-num-in { from { opacity: 0; transform: scale(0.86); } }

.or-ill {
  display: flex;
  justify-content: center;
  margin: 20px 0 18px;
  color: var(--deep);
  animation: or-fade 0.9s ease 0.35s backwards;
}
@keyframes or-fade { from { opacity: 0; } }

.or-facette {
  text-align: center;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--deep);
}
.or-maitre {
  display: block;
  margin-top: 8px;
  font-size: 9.5px;
  letter-spacing: 0.22em;
  color: var(--ink-3);
}

.or-msg {
  font-family: var(--read);
  font-weight: 300;
  font-size: 20px;
  line-height: 1.62;
  text-align: center;
  margin: 22px 6px 30px;
  animation: or-fade 0.9s ease 0.5s backwards;
}

/* ---------- encart ---------- */
.or-more { border-top: 1px solid var(--line); padding-top: 6px; }
.or-toggle {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: transparent;
  border: 0;
  padding: 16px 4px;
  cursor: pointer;
  font-family: var(--ui);
  font-size: 13.5px;
  color: var(--ink-2);
}
.or-toggle:focus-visible { outline: 2px solid var(--deep); outline-offset: 2px; border-radius: 8px; }
.or-chev { transition: transform 0.35s ease; color: var(--ink-3); }
.or-chev.open { transform: rotate(180deg); }

.or-panel { max-height: 0; overflow: hidden; transition: max-height 0.55s cubic-bezier(0.22, 1, 0.36, 1); }
.or-panel.open { max-height: 1400px; }
.or-panel-inner { padding: 6px 4px 12px; }

.or-row { padding: 18px 0; border-bottom: 1px solid var(--line); }
.or-row:last-child { border-bottom: 0; }
.or-row-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--deep);
  margin-bottom: 7px;
}
.or-row-text { font-size: 14.5px; line-height: 1.62; color: var(--ink-2); }
.or-row-text.or-em {
  font-family: var(--read);
  font-style: italic;
  font-weight: 300;
  font-size: 17px;
  color: var(--ink);
}

.or-again {
  margin-top: 30px;
  font-family: var(--ui);
  font-size: 13px;
  color: var(--ink-2);
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 13px 26px;
  cursor: pointer;
  transition: border-color 0.3s, color 0.3s;
}
.or-again:hover { border-color: var(--ink-3); color: var(--ink); }
.or-again:focus-visible { outline: 2px solid var(--deep); outline-offset: 3px; }

@media (max-width: 860px) {
  .or-root { --cw: 84px; --ch: 126px; --radius: 620px; }
}
@media (max-width: 560px) {
  .or-root { --cw: 62px; --ch: 94px; --radius: 400px; }
  .or-card { padding: 36px 22px 24px; border-radius: 24px; }
  .or-msg { font-size: 18.5px; }
  .or-halo { width: 150px; height: 150px; }
}
@media (prefers-reduced-motion: reduce) {
  .or-root *, .or-root { animation: none !important; transition: none !important; }
}
`;

function Oracle() {
  const [phase, setPhase] = useState("idle"); // idle | spread | card
  const [deck, setDeck] = useState([]);
  const [card, setCard] = useState(null);
  const [open, setOpen] = useState(false);
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1024);

  useEffect(() => {
    const onResize = () => setW(window.innerWidth);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  // combien de cartes on étale, et sur quel angle
  const fanCount = Math.min(FAN_MAX, w < 560 ? 13 : w < 860 ? 17 : FAN_MAX, CARDS.length);
  const fanDeg = w < 560 ? 62 : w < 860 ? 58 : 54;

  const spread = () => {
    setDeck(shuffle(CARDS).slice(0, fanCount));
    setCard(null);
    setOpen(false);
    setPhase("spread");
  };

  const choose = (c) => {
    setCard(c);
    setPhase("card");
  };

  const style = card
    ? { "--pastel": card.pastel, "--deep": card.deep, "--tint": card.tint }
    : undefined;

  return (
    <div className="or-root" style={style}>
      <style>{CSS}</style>

      {phase === "idle" && (
        <div className="or-start">
          <div className="or-logo-idle">
            <Logo size={72} stroke={0.45} />
          </div>
          <button className="or-btn" onClick={spread}>
            Tirer une carte
          </button>
        </div>
      )}

      {phase === "spread" && (
        <div className="or-spread-wrap">
          <div className="or-spread" role="group" aria-label={`${deck.length} cartes face cachée`}>
            {deck.map((c, i) => {
              const t = deck.length > 1 ? i / (deck.length - 1) - 0.5 : 0;
              const rot = t * fanDeg;
              return (
                <button
                  key={c.n}
                  className="or-back"
                  style={{
                    "--rot": `${rot}deg`,
                    transform: `rotate(${rot}deg)`,
                    zIndex: i,
                    animationDelay: `${i * 0.035}s`,
                  }}
                  onClick={() => choose(c)}
                  aria-label={`Choisir la carte ${i + 1} sur ${deck.length}`}
                >
                  <Logo size={w < 560 ? 26 : 34} stroke={0.5} opacity={0.9} />
                </button>
              );
            })}
          </div>
          <div className="or-hint">Choisis la carte qui t'appelle</div>
        </div>
      )}

      {phase === "card" && card && (
        <>
          <article className="or-card" key={card.n}>
            <div className="or-num-wrap">
              <div className="or-halo" aria-hidden="true" />
              <div className="or-num">{card.n}</div>
            </div>

            <div className="or-ill">
              <svg
                width="64"
                height="64"
                viewBox="0 0 64 64"
                fill="none"
                stroke="currentColor"
                strokeWidth="1.4"
                strokeLinecap="round"
                strokeLinejoin="round"
                aria-hidden="true"
              >
                {Ill[card.n]}
              </svg>
            </div>

            <div className="or-facette">
              {card.facette}
              {card.maitre && <span className="or-maitre">Nombre maître</span>}
            </div>

            <p className="or-msg">{card.message}</p>

            <div className="or-more">
              <button className="or-toggle" onClick={() => setOpen((o) => !o)} aria-expanded={open}>
                <span>Pour aller plus loin</span>
                <svg
                  className={`or-chev${open ? " open" : ""}`}
                  width="14"
                  height="14"
                  viewBox="0 0 14 14"
                  fill="none"
                  aria-hidden="true"
                >
                  <path d="M3 5l4 4 4-4" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" />
                </svg>
              </button>

              <div className={`or-panel${open ? " open" : ""}`}>
                <div className="or-panel-inner">
                  <div className="or-row">
                    <div className="or-row-label">Une question</div>
                    <div className="or-row-text or-em">{card.question}</div>
                  </div>
                  <div className="or-row">
                    <div className="or-row-label">Une action</div>
                    <div className="or-row-text">{card.action}</div>
                  </div>
                  <div className="or-row">
                    <div className="or-row-label">L'équilibre</div>
                    <div className="or-row-text">{card.equilibre}</div>
                  </div>
                  <div className="or-row">
                    <div className="or-row-label">Mantra</div>
                    <div className="or-row-text or-em">{card.mantra}</div>
                  </div>
                  <div className="or-row">
                    <div className="or-row-label">Le nombre {card.n}</div>
                    <div className="or-row-text">{card.numero}</div>
                  </div>
                </div>
              </div>
            </div>
          </article>

          <button className="or-again" onClick={spread}>
            Tirer une autre carte
          </button>
        </>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<Oracle />);
</script>
</body>
</html>
